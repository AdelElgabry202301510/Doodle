{% extends 'base.html' %}
{% block title %}Home - Doodle Search{% endblock %}
{% block body_class %}home{% endblock %}
{% block content %}
    <div class="home-panel">
    <div class="home-top">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Doodle logo" class="home-main-logo" />
    </div>
    <div class="search-container">
        <form action="{{ url_for('search') }}" method="get" class="search-form">
            <div id="autocomplete-root" class="autocomplete-root">
                <input id="query-input" name="q" type="search" autocomplete="off" list="suggestions" placeholder="Type a label or any text..." value="{{ query|e }}" autofocus />
            </div>
            <datalist id="suggestions">
                {% for suggestion in suggestions %}
                    <option value="{{ suggestion|e }}"></option>
                {% endfor %}
            </datalist>
            <button type="submit" class="search-button" aria-label="Search">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}
